<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Sci-Fi - Alien Design</title>
    <style>
        /* 1. CONFIGURACIÓN BASE Y FUENTES MONO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        :root {
            --bg-space: #07090e;
            --bg-card: rgba(16, 22, 34, 0.6);
            --neon-cyan: #00f0ff;
            --neon-green: #00ff66;
            --text-main: #cbd5e1;
        }

        body {
            background-color: var(--bg-space);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Fondo de Grilla Estilo HUD */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* 2. CONTENEDOR PRINCIPAL INTERACTIVO (EL MENÚ) */
        .hud-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 3rem;
            backdrop-filter: blur(10px);
            /* Esquinas recortadas estilo Sci-Fi */
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }

        /* Indicadores de Estado Técnicos */
        .sys-status {
            font-size: 0.75rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sys-status::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        h1 {
            font-size: 3rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            font-family: sans-serif;
            font-weight: 900;
        }

        h1 span {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        /* 3. BOTONES CON INTERACCIÓN LÁSER / GLITCH */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            cursor: pointer;
        }

        /* Línea de escaneo interna en el Hover */
        .nav-item:hover {
            color: #ffffff;
            background: rgba(0, 240, 255, 0.05);
            border-color: var(--neon-cyan);
            padding-left: 2rem; /* Se desplaza suavemente */
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .nav-item .index {
            color: var(--neon-cyan);
            font-size: 0.8rem;
            margin-right: 1.5rem;
        }

        .nav-item .label {
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: bold;
            flex-grow: 1;
        }

        .nav-item .arrow {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .nav-item:hover .arrow {
            transform: translateX(5px);
            color: var(--neon-cyan);
        }

        /* ANIMACIONES */
        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- CONTENEDOR HUD INTERACTIVO -->
    <div class="hud-container">
        <div class="sys-status">SYS_STATUS: OPERATIONAL // LOC: 12.09.26</div>
        
        <h1>ALIEN_<span>AGENCY</span></h1>
        <p class="subtitle">[ PROTOCOLO DE INTERFAZ CINETICA V.1.0 ]</p>
        
        <!-- NAVEGACIÓN -->
        <nav class="nav-links">
            <a class="nav-item">
                <span class="index">01//</span>
                <span class="label">Exploración de Datos</span>
                <span class="arrow">-></span>
            </a>
            <a class="nav-item">
                <span class="index">02//</span>
                <span class="label">Módulos del Sistema</span>
                <span class="arrow">-></span>
            </a>
            <a class="nav-item">
                <span class="index">03//</span>
                <span class="label">Descifrar Núcleo</span>
                <span class="arrow">-></span>
            </a>
        </nav>
    </div>

</body>
</html>
